build-koin-compose = { id = "com.sun.kmpstartertemplaterefined.plugins.koincompose" }
build-common = { id = "com.sun.kmpstartertemplaterefined.plugins.common" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }

[bundles]
gradle-plugins = [
    "kotlin-plugin",
    "compose-multiplatform-plugin",
]
