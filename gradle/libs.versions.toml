compose-material3-icons-extended = "1.7.3"
androidx-activity-compose = "1.12.4"
androidx-lifecycle = "2.9.6"
navigation-compose = "2.9.2"


# Firebase & Authentication
firebase-bom = "34.9.0"
gitlive-firebase = "2.4.0"
kmpauth-google = "2.3.1"
