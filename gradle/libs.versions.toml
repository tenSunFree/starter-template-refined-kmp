#Accompinist
accompanist-system-ui-controller = "0.36.0"

swift-klib = "0.6.4"
spm-kmp = "1.4.8"

# notifications
alarmee = "2.6.0"
onesignal = "5.6.1"

mixpanel-android = "8.3.0"
